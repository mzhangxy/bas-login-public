name: SAP BTP Auto Run BAS (单账号版)

on:
  #schedule:
    #- cron: "12 */12 * * *"   # 每5天运行一次（UTC 0点）
  workflow_dispatch:

jobs:
  run-bas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install playwright axios form-data

      - name: Run BAS automation script
        run: node login.js
        env:
          # 替换为单账号所需的环境变量
          SAP_EMAIL: ${{ secrets.SAP_EMAIL }}
          SAP_PASSWORD: ${{ secrets.SAP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload screenshots as artifact
        # 无论成功还是失败，都上传截图，方便通过调试截图排查错误
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: sap-btp-screenshots
          path: |
            *.png
